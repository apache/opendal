name: hdfs_default_gcs
description: 'Behavior test for hdfs default over gcs'

runs:
  using: "composite"
  steps:
    - name: Load secrets
      uses: 1Password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4.0.0
      with:
        export-env: true
      env:
        OPENDAL_GCS_ROOT: op://services/gcs/root
        OPENDAL_GCS_BUCKET: op://services/gcs/bucket
        OPENDAL_GCS_CREDENTIAL: op://services/gcs/credential

    - name: Setup hadoop
      uses: ./.github/actions/setup-hadoop

    - name: Setup Haddop GCS connector
      shell: bash
      run: |
        curl --location \
          --silent \
          --show-error \
          --fail \
          --output ${HADOOP_HOME}/share/hadoop/common/lib/gcs-connector-hadoop3-2.2.19-shaded.jar \
          https://github.com/GoogleCloudDataproc/hadoop-connectors/releases/download/v2.2.19/gcs-connector-hadoop3-2.2.19-shaded.jar

    - name: Setup Haddop GCS connector env
      shell: bash
      run: |
        cp ${{ github.workspace }}/fixtures/hdfs/gcs-core-site.xml ${HADOOP_HOME}/etc/hadoop/core-site.xml

        cat << EOF >> $GITHUB_ENV
        OPENDAL_HDFS_ROOT=${OPENDAL_GCS_ROOT}
        OPENDAL_HDFS_NAME_NODE=gs://${OPENDAL_GCS_BUCKET}
        OPENDAL_TEST_CAPABILITY_OVERRIDES=write_can_append=false
        EOF

        mkdir -p /tmp/hdfs

        echo ${OPENDAL_GCS_CREDENTIAL} | base64 -d > /tmp/hdfs/gcs-credentials.json
