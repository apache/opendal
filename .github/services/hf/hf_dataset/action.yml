name: hf_dataset
description: "Behavior test for Huggingface Dataset (read/write)"

runs:
  using: "composite"
  steps:
    - name: Setup
      uses: 1Password/load-secrets-action@dafbe7cb03502b260e2b2893c753c352eee545bf # v3.2.1
      with:
        export-env: true
      env:
        OPENDAL_HF_TOKEN: op://services/hf/token
    - name: Create temp dataset repo
      uses: ./.github/actions/hf-temp-repo
      with:
        repo_id: opendal/test-dataset-${{ github.run_id }}-${{ github.job }}
        repo_type: dataset
        token: ${{ env.OPENDAL_HF_TOKEN }}
    - name: Setup env
      shell: bash
      run: |
        cat << EOF >> $GITHUB_ENV
        OPENDAL_HF_REPO_TYPE=dataset
        RUST_TEST_THREADS=1
        EOF
