name: Bindings Dotnet CI

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
    branches:
      - main
    paths:
      - "bindings/dotnet/**"
      - "core/**"
      - ".github/workflows/ci_bindings_dotnet.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup dotnet toolchain
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Setup Rust toolchain
        uses: ./.github/actions/setup
        with:
          need-nextest: true
          need-protoc: true
          need-rocksdb: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Clippy Check
        working-directory: "bindings/dotnet"
        run: |
          cargo clippy -- -D warnings

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        dotnet-version:
          - '8.0.x'
          - '10.0.x'
    steps:
      - uses: actions/checkout@v7
      - name: Setup dotnet toolchain
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
      - name: Setup Rust toolchain
        uses: ./.github/actions/setup
        with:
          need-nextest: true
          need-protoc: true
          need-rocksdb: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Test
        working-directory: "bindings/dotnet"
        run: |
          cargo build
          dotnet test -f ${{ matrix.dotnet-version == '8.0.x' && 'net8.0' || 'net10.0' }}
        env:
          OPENDAL_TEST: memory

      # The example backs the snippet shown in the website guide. Running it
      # keeps the docs honest: a broken example fails CI instead of shipping
      # bad docs. It uses the in-memory service, so it needs no credentials.
      - name: Run guide example
        working-directory: "bindings/dotnet"
        run: |
          dotnet run --project examples/GettingStarted -f ${{ matrix.dotnet-version == '8.0.x' && 'net8.0' || 'net10.0' }}
