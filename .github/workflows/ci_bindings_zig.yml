name: Bindings Zig CI

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
    branches:
      - main
    paths:
      - "core/**"
      - "bindings/c/**"
      - "bindings/zig/**"
      - ".github/workflows/ci_bindings_zig.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Zig
        shell: bash
        run: |
          ZIG_VERSION=0.14.0
          case "${RUNNER_OS}-${RUNNER_ARCH}" in
            Linux-X64) ZIG_TARGET=linux-x86_64 ;;
            *)
              echo "unsupported host for Zig: ${RUNNER_OS}-${RUNNER_ARCH}" >&2
              exit 1
              ;;
          esac
          ZIG_HOME="${RUNNER_TOOL_CACHE}/zig/${ZIG_VERSION}"
          mkdir -p "${ZIG_HOME}"
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-${ZIG_TARGET}-${ZIG_VERSION}.tar.xz" \
            | tar -xJ --strip-components=1 -C "${ZIG_HOME}"
          echo "${ZIG_HOME}" >> "${GITHUB_PATH}"

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup

      - name: Install C build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config uuid-dev

      - name: Build Zig binding
        working-directory: bindings/zig
        run: zig build libopendal_c

      - name: Check diff
        run: git diff --exit-code

      - name: Check
        working-directory: bindings/zig
        run: zig fmt --check .

      - name: Run tests
        working-directory: bindings/zig
        run: zig build test --summary all
