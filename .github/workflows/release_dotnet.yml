name: Release Dotnet Binding

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/release_dotnet.yml"
      - "bindings/dotnet/build.py"
      - "bindings/dotnet/OpenDAL/OpenDAL.csproj"
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: true
        type: choice
        default: none
        options:
          - none
          - preview
          - rc

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-native:
    name: Build Native - ${{ matrix.classifier }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: "bindings/dotnet"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            classifier: linux-x86_64
            artifact: libopendal_dotnet.so
          - os: windows-latest
            classifier: windows-x86_64
            artifact: opendal_dotnet.dll
          - os: macos-latest
            classifier: osx-aarch_64
            artifact: libopendal_dotnet.dylib

    steps:
      - uses: actions/checkout@v7
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Setup Rust toolchain
        uses: ./.github/actions/setup
        with:
          need-protoc: true
          need-rocksdb: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build native library
        run: python build.py --classifier ${{ matrix.classifier }}

      - name: Upload native artifact
        uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.classifier }}
          path: bindings/dotnet/target/native/${{ matrix.classifier }}/${{ matrix.artifact }}
          if-no-files-found: error

  package:
    name: Pack NuGet package
    runs-on: ubuntu-latest
    needs:
      - build-native
    defaults:
      run:
        working-directory: "bindings/dotnet"

    steps:
      - uses: actions/checkout@v7
      - name: Setup dotnet toolchain
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Download native artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: native-*
          merge-multiple: true
          path: bindings/dotnet/target/release-assets

      - name: Prepare runtime assets
        shell: bash
        run: |
          mkdir -p OpenDAL/runtimes/win-x64/native
          mkdir -p OpenDAL/runtimes/linux-x64/native
          mkdir -p OpenDAL/runtimes/osx-arm64/native

          cp target/release-assets/opendal_dotnet.dll OpenDAL/runtimes/win-x64/native/
          cp target/release-assets/libopendal_dotnet.so OpenDAL/runtimes/linux-x64/native/
          cp target/release-assets/libopendal_dotnet.dylib OpenDAL/runtimes/osx-arm64/native/

      - name: Determine version suffix
        id: version
        shell: bash
        run: |
          set -euo pipefail

          suffix=""
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\.([0-9]+)$ ]]; then
            suffix="rc.${BASH_REMATCH[1]}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            suffix=""
          else
            case "${{ inputs.release_type }}" in
              rc)
                suffix="rc"
                ;;
              *)
                suffix="preview.${GITHUB_RUN_NUMBER}"
                ;;
            esac
          fi

          echo "version_suffix=${suffix}" >> "$GITHUB_OUTPUT"

      - name: Pack OpenDAL
        shell: bash
        run: |
          set -euo pipefail

          pack_args=(
            OpenDAL/OpenDAL.csproj
            -c Release
            -o artifacts/package
          )
          if [[ -n "${{ steps.version.outputs.version_suffix }}" ]]; then
            pack_args+=(--version-suffix "${{ steps.version.outputs.version_suffix }}")
          fi

          dotnet pack "${pack_args[@]}"

      - name: Upload NuGet package
        uses: actions/upload-artifact@v7
        with:
          name: dotnet-package
          path: bindings/dotnet/artifacts/package/*.nupkg
          if-no-files-found: error

  pr-login-check:
    name: PR Login Check
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: NuGet login
        shell: bash
        env:
          NUGET_USERNAME: Apache.OpenDAL
        run: |
          set -euo pipefail

          echo "Workflow event: ${GITHUB_EVENT_NAME}"
          echo "Ref: ${GITHUB_REF}"

          if [[ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" || -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]]; then
            echo "::error::ACTIONS_ID_TOKEN_REQUEST_URL or ACTIONS_ID_TOKEN_REQUEST_TOKEN is empty"
            exit 1
          fi

          echo "Requesting GitHub OIDC token from GitHub"
          oidc_response="$(curl -sS -w '\n%{http_code}' \
            -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https%3A%2F%2Fwww.nuget.org")"
          oidc_http_code="$(tail -n1 <<<"${oidc_response}")"
          oidc_body="$(sed '$d' <<<"${oidc_response}")"

          if [[ "${oidc_http_code}" != "200" ]]; then
            echo "OIDC HTTP status: ${oidc_http_code}"
            echo "OIDC response body:"
            echo "${oidc_body}"
            echo "::error::Failed to obtain an OIDC token from GitHub"
            exit 1
          fi

          oidc_token="$(python3 -c 'import json, sys; data=json.load(sys.stdin); print(data["value"])' <<<"${oidc_body}")"
          echo "::add-mask::${oidc_token}"

          request_body="$(python3 -c 'import json, os; print(json.dumps({"username": os.environ["NUGET_USERNAME"], "tokenType": "ApiKey"}))')"

          login_response="$(curl -sS -w '\n%{http_code}' \
            -X POST https://www.nuget.org/api/v2/token \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${oidc_token}" \
            -H "User-Agent: apache-opendal-release" \
            --data "${request_body}")"
          login_http_code="$(tail -n1 <<<"${login_response}")"
          login_body="$(sed '$d' <<<"${login_response}")"
          echo "NuGet login HTTP status: ${login_http_code}"

          if [[ "${login_http_code}" != "200" ]]; then
            echo "NuGet login response body:"
            echo "${login_body}"
            echo "::error::NuGet login failed"
            exit 1
          fi

          api_key="$(python3 -c 'import json, sys; data=json.load(sys.stdin); print(data["apiKey"])' <<<"${login_body}")"
          echo "::add-mask::${api_key}"
          echo "PR login check completed successfully."

  publish:
    name: Publish
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.release_type != 'none') || (startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')) }}
    runs-on: ubuntu-latest
    needs:
      - package
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Setup dotnet toolchain
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Download NuGet package
        uses: actions/download-artifact@v8
        with:
          name: dotnet-package
          path: bindings/dotnet/artifacts/package

      - name: NuGet login
        id: login
        shell: bash
        env:
          NUGET_USERNAME: Apache.OpenDAL
        run: |
          oidc_token="$(curl -fsSL \
            -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https%3A%2F%2Fwww.nuget.org" \
            | python3 -c 'import json, sys; print(json.load(sys.stdin)["value"])')"
          echo "::add-mask::${oidc_token}"

          request_body="$(python3 -c 'import json, os; print(json.dumps({"username": os.environ["NUGET_USERNAME"], "tokenType": "ApiKey"}))')"
          api_key="$(curl -fsSL \
            -X POST https://www.nuget.org/api/v2/token \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${oidc_token}" \
            -H "User-Agent: apache-opendal-release" \
            --data "${request_body}" \
            | python3 -c 'import json, sys; print(json.load(sys.stdin)["apiKey"])')"
          echo "::add-mask::${api_key}"
          echo "NUGET_API_KEY=${api_key}" >> "${GITHUB_OUTPUT}"

      - name: Publish package
        run: dotnet nuget push bindings/dotnet/artifacts/package/*.nupkg --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
