# This workflow publishes all Rust packages that are intended for crates.io.

name: Release Rust Packages

on:
  push:
    tags:
      - "*"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/release_rust.yml"
      - ".github/scripts/release_rust/**"
      - "core/testkit/Cargo.toml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.plan.outputs.packages }}
    steps:
      - uses: actions/checkout@v6
      - name: Plan publish matrix
        id: plan
        run: python3 .github/scripts/release_rust/plan.py --github-output

  publish:
    if: ${{ startsWith(github.ref, 'refs/tags/') && !contains(github.ref, '-') }}
    needs: plan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Checkout python env
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Checkout java env
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 25
      - name: Setup Rust toolchain
        uses: ./.github/actions/setup
        with:
          need-rocksdb: true
          need-protoc: true
      - uses: rust-lang/crates-io-auth-action@b7e9a28eded4986ec6b1fa40eeee8f8f165559ec
        id: auth
      - name: Publish Rust crates
        env:
          PACKAGES: ${{ needs.plan.outputs.packages }}
          LD_LIBRARY_PATH: ${{ env.JAVA_HOME }}/lib/server:${{ env.LD_LIBRARY_PATH }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN || steps.auth.outputs.token }}
        run: python3 .github/scripts/release_rust/publish.py
