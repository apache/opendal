name: Behavior Test Binding NodeJS

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      cases:
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  # Prevent parallel cache building in `test` job by building cache in a separate job
  node-cache:
    runs-on: ${{ inputs.os }}

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 8
          run_install: false

      - uses: actions/setup-node@v6
        with:
          # params must be in sync with `test` job
          node-version: "20"
          cache: pnpm
          cache-dependency-path: "bindings/nodejs/pnpm-lock.yaml"
      
      - name: Install dependencies
        working-directory: bindings/nodejs
        run: pnpm install --frozen-lockfile


  test:
    name: ${{ matrix.cases.service }} / ${{ matrix.cases.setup }}
    needs: node-cache
    runs-on: ${{ inputs.os }}
    strategy:
      fail-fast: false
      matrix:
        cases: ${{ fromJson(inputs.cases) }}
    steps:
      - uses: actions/checkout@v7
      - name: Setup Rust toolchain
        uses: ./.github/actions/setup
        with:
          need-nextest: true
          need-protoc: true
          need-rocksdb: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup 1Password Connect
        shell: bash
        run: |
          echo "::add-mask::${{ secrets.OP_CONNECT_HOST }}"
          echo "::add-mask::${{ secrets.OP_CONNECT_TOKEN }}"
          echo "OP_CONNECT_HOST=${{ secrets.OP_CONNECT_HOST }}" >> "$GITHUB_ENV"
          echo "OP_CONNECT_TOKEN=${{ secrets.OP_CONNECT_TOKEN }}" >> "$GITHUB_ENV"

      - uses: pnpm/action-setup@v6
        with:
          version: 8
          run_install: false

      - uses: actions/setup-node@v6
        with:
          # params must be in sync with `node-cache` job
          node-version: "20"
          cache: pnpm
          cache-dependency-path: "bindings/nodejs/pnpm-lock.yaml"

      - name: Install dependencies
        working-directory: bindings/nodejs
        run: pnpm install --frozen-lockfile

      - name: Test Core
        uses: ./.github/actions/test_behavior_binding_nodejs
        with:
          setup: ${{ matrix.cases.setup }}
          service: ${{ matrix.cases.service }}
          feature: ${{ matrix.cases.feature }}
