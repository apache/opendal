[package]
description = "Apache OpenDAL reqwest HTTP transport implementation"
name = "opendal-http-transport-reqwest"

authors = { workspace = true }
edition = { workspace = true }
homepage = { workspace = true }
license = { workspace = true }
repository = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }

[package.metadata.docs.rs]
all-features = true

[features]
default = ["native-tls"]
# Use platform TLS via reqwest's native-tls feature.
native-tls = ["reqwest/native-tls"]
# Use Rustls with reqwest's default crypto provider and platform certificate verification.
rustls = ["reqwest/rustls"]
# Use Rustls without a built-in crypto provider.
rustls-no-provider = ["reqwest/rustls-no-provider"]
# Use Rustls with the aws-lc-rs crypto provider and bundled Mozilla root certificates.
webpki-roots = [
  "reqwest/rustls-no-provider",
  "dep:rustls",
  "rustls/aws-lc-rs",
  "dep:webpki-roots",
]

[dependencies]
bytes = { workspace = true }
futures = { workspace = true, features = ["std"] }
http = { workspace = true }
http-body = "1"
opendal-core = { path = "../../core", version = "0.57.0", default-features = false }
reqwest = { version = "0.13.4", features = [
  "stream",
], default-features = false }
rustls = { version = "0.23", optional = true, default-features = false }
webpki-roots = { version = "1", optional = true }
