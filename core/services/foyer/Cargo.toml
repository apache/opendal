[package]
description = "Apache OpenDAL Foyer service implementation"
name = "opendal-service-foyer"

authors = { workspace = true }
edition = { workspace = true }
homepage = { workspace = true }
license = { workspace = true }
repository = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }

[package.metadata.docs.rs]
all-features = true

[dependencies]
foyer = { version = "0.22.3" }
log = { workspace = true }
opendal-core = { path = "../../core", version = "0.58.1", default-features = false }
serde = { workspace = true, features = ["derive"] }

[dev-dependencies]
opendal = { path = "../..", version = "0.58.1", features = ["services-memory"] }
opendal-core = { path = "../../core", version = "0.58.1", features = [
  "services-memory",
] }
size = "0.5"
tempfile = "3"
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
