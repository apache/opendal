version: "3.8"
services:
  etcd:
    image: gcr.io/etcd-development/etcd:v3.5.16
    ports:
      - "2379:2379"
    volumes:
      - ./certs/:/srv/
      - /etc/ssl/certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt
      - etcd-data:/etcd-data
    environment:
      ETCD_NAME: etcd
      ETCDCTL_API: 3
      ETCD_DATA_DIR: /etcd-data
      ETCD_LISTEN_CLIENT_URLS: https://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: https://etcd:2379
      ETCD_MAX_REQUEST_BYTES: 10485760
      ETCD_CERT_FILE: /srv/server.pem
      ETCD_KEY_FILE: /srv/server-key.pem
      ETCD_TRUSTED_CA_FILE: /srv/ca.pem
      ETCD_CLIENT_CERT_AUTH: 1

volumes:
  etcd-data:
